<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CheckGate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        :root { --primary-blue: #0A3654; --accent-green: #1A8257; --bg-light: #f4f7f9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background-color: var(--bg-light); margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px 20px; border-radius: 12px; box-shadow: 0 8px 16px rgba(10, 54, 84, 0.1); border-top: 5px solid var(--primary-blue); }
        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo-container img { max-width: 180px; height: auto; }
        label { display: block; margin-top: 15px; font-weight: bold; color: var(--primary-blue); }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background-color: var(--primary-blue); color: white; border: none; border-radius: 8px; font-size: 1.1em; margin-top: 20px; cursor: pointer; font-weight: bold; }
        button.camera-btn { background-color: var(--accent-green); margin-top: 10px; }
        button.secondary-btn { background-color: #6c757d; }
        .result { padding: 20px; border-radius: 8px; font-weight: bold; text-align: center; font-size: 1.2em; margin-bottom: 20px; }
        .success { background-color: #e8f5e9; color: var(--accent-green); border: 2px solid var(--accent-green); }
        .error { background-color: #fbe9e7; color: #d32f2f; border: 2px solid #d32f2f; }
        .warning { background-color: #fff8e1; color: #f57c00; border: 2px solid #f57c00; }
        .action-section { border-top: 2px solid #eee; padding-top: 15px; margin-top: 15px; }
        #reader { width: 100%; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="formPage">
            <div class="logo-container">
                <img src="logo.png" alt="CheckGate Logo">
            </div>
            
            <label for="datum">1. Datum:</label><input type="date" id="datum">
            
            <label for="seriennummer">2. Seriennummer:</label>
            <input type="text" id="seriennummer" placeholder="Scannen oder tippen...">
            <button type="button" class="camera-btn" onclick="startScanner()">Barcode scannen</button>
            <div id="reader"></div>

            <label for="menge">3. Gelieferte Menge (Stück):</label><input type="number" id="menge" min="1" value="1">
            <label for="preis">4. Einzelpreis Netto (€):</label><input type="number" id="preis" min="0" step="0.01" value="0.00">
            <label for="verpackung">5. Sichtprüfung: Verpackung intakt?</label>
            <select id="verpackung"><option value="ja">Ja</option><option value="nein">Nein (Transportschaden)</option></select>
            <label for="mengeOk">6. Mengenprüfung: Stimmt mit Lieferschein überein?</label>
            <select id="mengeOk"><option value="ja">Ja</option><option value="nein">Nein</option></select>
            <label for="maengel">7. Detailprüfung: Defekte/fehlendes Zubehör?</label>
            <select id="maengel"><option value="nein">Nein (Alles in Ordnung)</option><option value="ja">Ja (Mangel festgestellt)</option></select>
            <button onclick="pruefen()">Absenden</button>
        </div>

        <div id="resultPage" style="display:none;">
            <div class="logo-container">
                <img src="logo.png" alt="CheckGate Logo">
            </div>
            
            <div id="resultBox" class="result"></div>
            
            <div id="successActions" class="action-section" style="display:none;">
                <button class="camera-btn" onclick="downloadCSV()">CSV-Protokoll herunterladen</button>
            </div>
            
            <div id="errorActions" class="action-section" style="display:none;">
                <label for="mangelBeschreibung">Beschreibung der Schäden/Mängel:</label>
                <textarea id="mangelBeschreibung" rows="4" placeholder="Details eingeben..."></textarea>
                <label for="mangelBilder">Bilder hochladen (Mehrfachauswahl möglich):</label>
                <input type="file" id="mangelBilder" accept="image/*" multiple capture="environment">
                <button class="camera-btn" onclick="downloadZIP()">Bestätigen & ZIP herunterladen</button>
            </div>
            <button class="secondary-btn" onclick="zurueck()">Neue Prüfung starten</button>
        </div>
    </div>

    <script>
        document.getElementById('datum').valueAsDate = new Date();
        let currentStatus = "";
        let html5QrCode;

        function startScanner() {
            const readerDiv = document.getElementById('reader');
            readerDiv.style.display = "block";
            
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            const config = { fps: 10, qrbox: { width: 250, height: 100 } };
            
            html5QrCode.start({ facingMode: "environment" }, config,
                (decodedText) => {
                    document.getElementById('seriennummer').value = decodedText;
                    html5QrCode.stop().then(() => {
                        readerDiv.style.display = "none";
                    });
                },
                (errorMessage) => {
                    // Ignorieren, da kontinuierlich gescannt wird
                }
            ).catch((err) => {
                alert("Fehler beim Zugriff auf die Kamera: " + err);
            });
        }

        function pruefen() {
            const seriennummer = document.getElementById('seriennummer').value;
            const menge = parseInt(document.getElementById('menge').value);
            const preis = parseFloat(document.getElementById('preis').value);
            const verpackung = document.getElementById('verpackung').value;
            const mengeOk = document.getElementById('mengeOk').value;
            const maengel = document.getElementById('maengel').value;
            
            if (!seriennummer) { alert("Bitte eine Seriennummer erfassen."); return; }

            const formPage = document.getElementById('formPage');
            const resultPage = document.getElementById('resultPage');
            const resultBox = document.getElementById('resultBox');
            
            resultBox.className = 'result'; 
            let isError = false;
            let statusHtml = "";

            if (verpackung === 'nein' || mengeOk === 'nein') {
                isError = true;
                resultBox.classList.add('error');
                statusHtml = `STATUS: GESPERRT<br><br>Grund: ${verpackung === 'nein' ? 'Transportschaden' : 'Mengenabweichung'}`;
                currentStatus = "Gesperrt";
            } else {
                let pruefart = (menge > 15 && preis < 1000) ? "Stichprobenprüfung" : "100% Vollprüfung";
                if (maengel === 'ja') {
                    isError = true;
                    resultBox.classList.add('error');
                    statusHtml = 'STATUS: GESPERRT<br><br>Grund: Technische Mängel / fehlendes Zubehör.';
                    currentStatus = "Gesperrt (Mangel)";
                } else {
                    resultBox.classList.add('success');
                    statusHtml = `STATUS: FREIGEGEBEN<br><br>Durchgeführte Prüfart: ${pruefart}`;
                    currentStatus = "Freigegeben";
                }
            }

            resultBox.innerHTML = statusHtml;
            document.getElementById('successActions').style.display = isError ? 'none' : 'block';
            document.getElementById('errorActions').style.display = isError ? 'block' : 'none';
            formPage.style.display = 'none';
            resultPage.style.display = 'block';
            
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop();
                document.getElementById('reader').style.display = "none";
            }
        }

        function generateCSVContent(includeMangelInfo) {
            const zeitstempel = new Date().toISOString().replace('T', ' ').substring(0, 19);
            let csv = "Zeitstempel;Datum;Seriennummer;Menge;Preis_Netto;Verpackung_OK;Menge_OK;Keine_Maengel;Status";
            if (includeMangelInfo) csv += ";Mangelbeschreibung";
            csv += "\n";
            csv += `${zeitstempel};${document.getElementById('datum').value};${document.getElementById('seriennummer').value};${document.getElementById('menge').value};${document.getElementById('preis').value};${document.getElementById('verpackung').value};${document.getElementById('mengeOk').value};${document.getElementById('maengel').value};${currentStatus}`;
            
            if (includeMangelInfo) {
                let beschreibung = document.getElementById('mangelBeschreibung').value.replace(/(\r\n|\n|\r)/gm, " ");
                csv += `;${beschreibung}`;
            }
            return csv;
        }

        function downloadCSV() {
            const blob = new Blob([generateCSVContent(false)], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Wareneingang_${document.getElementById('seriennummer').value}.csv`;
            link.click();
        }

        function downloadZIP() {
            const zip = new JSZip();
            zip.file("pruefprotokoll.csv", generateCSVContent(true));
            const files = document.getElementById('mangelBilder').files;
            for (let i = 0; i < files.length; i++) {
                zip.file(files[i].name, files[i]);
            }
            zip.generateAsync({type:"blob"}).then(function(content) {
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = `Maengelbericht_${document.getElementById('seriennummer').value}.zip`;
                link.click();
            });
        }

        function zurueck() {
            document.getElementById('formPage').style.display = 'block';
            document.getElementById('resultPage').style.display = 'none';
            document.getElementById('seriennummer').value = ''; 
            document.getElementById('mangelBeschreibung').value = '';
            document.getElementById('mangelBilder').value = '';
        }
    </script>
</body>
</html>
