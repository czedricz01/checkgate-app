<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CheckGate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --primary-blue: #0A3654; --accent-green: #1A8257; --bg-light: #f4f7f9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background-color: var(--bg-light); margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px 20px; border-radius: 12px; box-shadow: 0 8px 16px rgba(10, 54, 84, 0.1); border-top: 5px solid var(--primary-blue); position: relative; }
        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo-container img { max-width: 180px; height: auto; }
        label { display: block; margin-top: 15px; font-weight: bold; color: var(--primary-blue); }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background-color: var(--primary-blue); color: white; border: none; border-radius: 8px; font-size: 1.1em; margin-top: 20px; cursor: pointer; font-weight: bold; }
        button.camera-btn { background-color: var(--accent-green); margin-top: 10px; }
        button.secondary-btn { background-color: #6c757d; }
        .result { padding: 20px; border-radius: 8px; font-weight: bold; text-align: center; font-size: 1.2em; margin-bottom: 20px; }
        .success { background-color: #e8f5e9; color: var(--accent-green); border: 2px solid var(--accent-green); }
        .error { background-color: #fbe9e7; color: #d32f2f; border: 2px solid #d32f2f; }
        .action-section { border-top: 2px solid #eee; padding-top: 15px; margin-top: 15px; }
        #reader { width: 100%; margin-top: 15px; display: none; }
        .login-btn-top { position: absolute; top: 10px; right: 10px; background-color: #6c757d; width: auto; padding: 8px 15px; font-size: 0.9em; margin-top: 0; }
        .instruction-box { background-color: #e3f2fd; color: #0d47a1; padding: 15px; border-radius: 8px; border-left: 5px solid #0d47a1; margin-bottom: 20px; font-weight: bold; font-size: 1.1em; text-align: center; }
        .netto-box { display: none; padding: 10px; background-color: #e8f5e9; border: 1px solid var(--accent-green); border-radius: 8px; margin-top: 5px; color: var(--accent-green); font-weight: bold; }
        .calc-box { background-color: #fff3e0; border: 1px solid #ff9800; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        
        <div id="formPage">
            <button class="login-btn-top" onclick="zeigeSeite('loginPage')">Admin-Login</button>
            <div class="logo-container"><img src="logo.png" alt="CheckGate Logo"></div>
            
            <label for="datum">Datum:</label><input type="date" id="datum">
            <label for="mitarbeiter">Mitarbeiterkürzel:</label><input type="text" id="mitarbeiter" placeholder="z. B. AB">
            <label for="artikelnummer">Artikelnummer:</label>
            <input type="text" id="artikelnummer" placeholder="Scannen oder tippen...">
            <button type="button" class="camera-btn" onclick="startScanner()">Barcode scannen</button>
            <div id="reader"></div>

            <label for="menge">Gelieferte Menge (Stück):</label><input type="number" id="menge" min="1" value="100">
            <label for="preisArt">Preisart für Eingabe:</label>
            <select id="preisArt" onchange="berechneNetto()"><option value="netto">Netto</option><option value="brutto">Brutto</option></select>
            <label for="preisEingabe">Einzelpreis (€):</label>
            <input type="number" id="preisEingabe" min="0" step="0.01" value="0.00" oninput="berechneNetto()">
            <div id="nettoAnzeige" class="netto-box">Berechneter Nettopreis: <span id="nettoWert">0.00</span> €</div>

            <label for="verpackung">Sichtprüfung: Verpackung intakt?</label>
            <select id="verpackung"><option value="ja">Ja</option><option value="nein">Nein (Transportschaden)</option></select>
            <label for="mengeOk">Mengenprüfung: Stimmt mit Lieferschein überein?</label>
            <select id="mengeOk"><option value="ja">Ja</option><option value="nein">Nein</option></select>
            
            <button onclick="geheZuPruefung()">Weiter</button>
        </div>

        <div id="pruefungPage" style="display:none;">
            <div class="logo-container"><img src="logo.png" alt="CheckGate Logo"></div>
            <div id="pruefungsAnweisung" class="instruction-box"></div>
            
            <div id="stichprobenRechner" class="calc-box" style="display:none;">
                <h4 style="margin-top:0;">Stichprobenkalkulator</h4>
                <label for="fehlerakzeptanz">Fehlerakzeptanz (z. B. 0.01):</label>
                <input type="number" id="fehlerakzeptanz" value="0.01" step="0.001" oninput="updateStichproben()">
                <label for="erwartungswertfaktor">Erwartungswertfaktor:</label>
                <input type="number" id="erwartungswertfaktor" value="0.2" step="0.1" oninput="updateStichproben()">
                <div style="margin-top:15px; font-weight:bold; font-size:1.1em; color:#d84315;">
                    Nötige Stichproben: <span id="stichprobenErgebnis">0</span>
                </div>
            </div>
            
            <label for="pruefungErfolgreich">War die Prüfung erfolgreich?</label>
            <select id="pruefungErfolgreich">
                <option value="ja">Ja (Keine Mängel festgestellt)</option>
                <option value="nein">Nein (Mängel oder fehlendes Zubehör)</option>
            </select>
            
            <button onclick="pruefen()">Absenden</button>
            <button class="secondary-btn" onclick="zeigeSeite('formPage')">Zurück</button>
        </div>

        <div id="resultPage" style="display:none;">
            <div class="logo-container"><img src="logo.png" alt="CheckGate Logo"></div>
            <div id="resultBox" class="result"></div>
            <div id="errorActions" class="action-section" style="display:none;">
                <label for="mangelBeschreibung">Beschreibung der Schäden/Mängel:</label>
                <textarea id="mangelBeschreibung" rows="4" placeholder="Details eingeben..."></textarea>
                <label for="mangelBilder">Bilder hochladen:</label>
                <input type="file" id="mangelBilder" accept="image/*" multiple capture="environment">
                <button id="saveBtnError" class="camera-btn" onclick="inSupabaseSpeichern(true)">In Datenbank sichern & Neue Prüfung</button>
            </div>
            <div id="successActions" class="action-section" style="display:none;">
                <button id="saveBtnSuccess" class="camera-btn" onclick="inSupabaseSpeichern(false)">In Datenbank sichern & Neue Prüfung</button>
            </div>
        </div>

        <div id="loginPage" style="display:none;">
            <div class="logo-container"><img src="logo.png" alt="CheckGate Logo"></div>
            <h2 style="text-align: center; color: #0A3654;">Admin Login</h2>
            <label for="benutzername">Benutzername:</label><input type="text" id="benutzername" placeholder="Eingabe: admin">
            <label for="passwort">Passwort:</label><input type="password" id="passwort" placeholder="Eingabe: admin">
            <button onclick="login()">Einloggen</button><button class="secondary-btn" onclick="zeigeSeite('formPage')">Zurück</button>
        </div>
        <div id="adminPage" style="display:none;">
            <div class="logo-container"><img src="logo.png" alt="CheckGate Logo"></div>
            <h2 style="text-align: center; color: #0A3654;">Daten-Export</h2>
            <label for="exportStart">Von Datum:</label><input type="date" id="exportStart">
            <label for="exportEnde">Bis Datum:</label><input type="date" id="exportEnde">
            <button id="exportBtn" class="camera-btn" onclick="exportiereVonSupabase()">Gesamtdaten (CSV) herunterladen</button>
            <button class="secondary-btn" onclick="zeigeSeite('formPage')">Logout / Zurück</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://wllbkqqkecfosarmfzgc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsbGJrcXFrZWNmb3Nhcm1memdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDc4NDEsImV4cCI6MjA5MTEyMzg0MX0.icIQIDEwEPbldL7jL0VNgM9KGLRT424_pGYA5NLyiL4';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('datum').valueAsDate = new Date();
        document.getElementById('exportStart').valueAsDate = new Date();
        document.getElementById('exportEnde').valueAsDate = new Date();
        let currentStatus = "", erfassungsZeitstempel = "", aktuellePruefart = "", html5QrCode, berechneteStichproben = 0;

        function zeigeSeite(seiteId) {
            ['formPage', 'pruefungPage', 'resultPage', 'loginPage', 'adminPage'].forEach(id => document.getElementById(id).style.display = 'none');
            document.getElementById(seiteId).style.display = 'block';
        }

        function login() {
            if (document.getElementById('benutzername').value === 'admin' && document.getElementById('passwort').value === 'admin') zeigeSeite('adminPage');
            else alert('Falsche Zugangsdaten.');
        }

        function startScanner() {
            const rDiv = document.getElementById('reader'); rDiv.style.display = "block";
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => { document.getElementById('artikelnummer').value = text; html5QrCode.stop().then(() => rDiv.style.display = "none"); }).catch(e => alert(e));
        }

        function berechneNetto() {
            const isBrutto = document.getElementById('preisArt').value === 'brutto';
            const val = parseFloat(document.getElementById('preisEingabe').value) || 0;
            const anzeige = document.getElementById('nettoAnzeige');
            if (isBrutto) { document.getElementById('nettoWert').innerText = (val / 1.19).toFixed(2); anzeige.style.display = 'block'; } 
            else anzeige.style.display = 'none';
        }

        function holeNettoPreis() {
            const val = parseFloat(document.getElementById('preisEingabe').value) || 0;
            return document.getElementById('preisArt').value === 'brutto' ? parseFloat((val / 1.19).toFixed(2)) : val;
        }

        function updateStichproben() {
            const menge = parseInt(document.getElementById('menge').value) || 1;
            const fa = parseFloat(document.getElementById('fehlerakzeptanz').value) || 0;
            const ef = parseFloat(document.getElementById('erwartungswertfaktor').value) || 0;
            let maxFehler = menge * fa, sum = 0, stichproben = 0, restmenge = menge;
            
            /* Iterative Simulation der Ziehung ohne Zurücklegen */
            while (sum <= ef && restmenge > 0) {
                sum += maxFehler / restmenge;
                stichproben++;
                restmenge--;
            }
            berechneteStichproben = stichproben;
            document.getElementById('stichprobenErgebnis').innerText = stichproben;
        }

        function geheZuPruefung() {
            if (!document.getElementById('mitarbeiter').value.trim() || !document.getElementById('artikelnummer').value.trim()) return alert("Mitarbeiter und Artikelnummer sind Pflichtfelder.");
            const nettoPreis = holeNettoPreis();
            aktuellePruefart = (nettoPreis >= 750) ? "100% Vollprüfung" : "Stichprobenprüfung";
            document.getElementById('pruefungsAnweisung').innerText = "Bitte machen Sie eine " + aktuellePruefart + ".";
            document.getElementById('pruefungErfolgreich').value = 'ja'; 
            
            const rechnerBox = document.getElementById('stichprobenRechner');
            if (aktuellePruefart === "Stichprobenprüfung") { rechnerBox.style.display = 'block'; updateStichproben(); } 
            else { rechnerBox.style.display = 'none'; berechneteStichproben = 0; }
            
            if (html5QrCode?.isScanning) html5QrCode.stop();
            zeigeSeite('pruefungPage');
        }

        function pruefen() {
            const j = new Date(); erfassungsZeitstempel = j.toLocaleDateString('de-DE') + ' ' + j.toLocaleTimeString('de-DE');
            const rb = document.getElementById('resultBox'); rb.className = 'result';
            let err = (document.getElementById('verpackung').value==='nein' || document.getElementById('mengeOk').value==='nein' || document.getElementById('pruefungErfolgreich').value==='nein');
            currentStatus = err ? "Gesperrt" : "Freigegeben";
            rb.classList.add(err ? 'error' : 'success'); rb.innerHTML = `STATUS: ${currentStatus.toUpperCase()}`;
            document.getElementById('successActions').style.display = err ? 'none' : 'block'; document.getElementById('errorActions').style.display = err ? 'block' : 'none';
            zeigeSeite('resultPage');
        }

        async function inSupabaseSpeichern(isError) {
            const btn = isError ? document.getElementById('saveBtnError') : document.getElementById('saveBtnSuccess');
            btn.innerText = "Verarbeite..."; btn.disabled = true;
            let bilderUrls = []; const files = document.getElementById('mangelBilder').files;

            if (isError && files.length > 0) {
                for (let file of files) {
                    const fn = `${Date.now()}_${file.name.replace(/\\s/g, '_')}`;
                    const { error } = await supabaseClient.storage.from('maengelbilder').upload(fn, file);
                    if (error) alert("UPLOAD-FEHLER: " + error.message);
                    else bilderUrls.push(supabaseClient.storage.from('maengelbilder').getPublicUrl(fn).data.publicUrl);
                }
            }
            
            const dbMaengelWert = document.getElementById('pruefungErfolgreich').value === 'ja' ? 'nein' : 'ja';
            const dbFa = aktuellePruefart === "Stichprobenprüfung" ? parseFloat(document.getElementById('fehlerakzeptanz').value) : null;
            const dbEf = aktuellePruefart === "Stichprobenprüfung" ? parseFloat(document.getElementById('erwartungswertfaktor').value) : null;

            const { error: dbErr } = await supabaseClient.from('wareneingang').insert([{ 
                datum: document.getElementById('datum').value, zeitstempel: erfassungsZeitstempel, mitarbeiter: document.getElementById('mitarbeiter').value,
                seriennummer: document.getElementById('artikelnummer').value, menge: parseInt(document.getElementById('menge').value),
                preis: holeNettoPreis(), verpackung: document.getElementById('verpackung').value, mengeOk: document.getElementById('mengeOk').value,
                maengel: dbMaengelWert, pruefart: aktuellePruefart, fehlerakzeptanz: dbFa, erwartungswertfaktor: dbEf,
                stichproben_anzahl: berechneteStichproben || null, status: currentStatus, beschreibung: isError ? document.getElementById('mangelBeschreibung').value : "",
                bilder_urls: bilderUrls.join(',')
            }]);

            btn.innerText = "In Datenbank sichern & Neue Prüfung"; btn.disabled = false;
            if (dbErr) alert("DATENBANK-FEHLER: " + dbErr.message);
            else { alert("Erfolgreich gespeichert!"); document.getElementById('artikelnummer').value = ""; document.getElementById('mitarbeiter').value = ""; zeigeSeite('formPage'); }
        }

        async function exportiereVonSupabase() {
            const btn = document.getElementById('exportBtn'); btn.innerText = "CSV wird erstellt..."; btn.disabled = true;
            const { data: logs, error } = await supabaseClient.from('wareneingang').select('*').gte('datum', document.getElementById('exportStart').value).lte('datum', document.getElementById('exportEnde').value);

            if (error || !logs || !logs.length) { alert("Keine Daten gefunden."); btn.disabled = false; btn.innerText = "Gesamtdaten (CSV) herunterladen"; return; }

            let csv = "Datum;Exakte_Uhrzeit;Mitarbeiter;Artikelnummer;Menge;Netto_Preis;Prüfart;Fehlerakzeptanz;Erwartungswertfaktor;Nötige_Stichproben;Status;Beschreibung;Bilder_Links\\n";
            logs.forEach(l => csv += `${l.datum};${l.zeitstempel||''};${l.mitarbeiter||''};${l.seriennummer};${l.menge};${l.preis};${l.pruefart||''};${l.fehlerakzeptanz||''};${l.erwartungswertfaktor||''};${l.stichproben_anzahl||''};${l.status};"${l.beschreibung||''}";"${l.bilder_urls||''}"\\n`);
            
            const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' })); a.download = `Wareneingang_Export.csv`; a.click();
            btn.innerText = "Gesamtdaten (CSV) herunterladen"; btn.disabled = false;
        }
    </script>
</body>
</html>
